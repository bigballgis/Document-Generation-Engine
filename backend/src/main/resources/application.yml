spring:
  application:
    name: docgen-backend
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:docgen}
    username: ${POSTGRES_USER:docgen}
    password: ${POSTGRES_PASSWORD:docgen_local_pwd}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${DOCGEN_ASYNC_KAFKA_CONSUMER_GROUP:docgen-async-batch-worker}
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: record
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

docgen:
  environment: ${APP_ENVIRONMENT:dev}
  runtime:
    rate-limit:
      enabled: ${RUNTIME_RATE_LIMIT_ENABLED:true}
      requests-per-minute: ${RUNTIME_RATE_LIMIT_RPM:120}
      burst-capacity: ${RUNTIME_RATE_LIMIT_BURST:120}
  idempotency:
    cache: ${IDEMPOTENCY_CACHE:redis}
    redis-key-prefix: "docgen:idempotency:"
  async:
    transport: ${ASYNC_TRANSPORT:in-process}
    kafka:
      async-batch-topic: generation.async-batch-task.v1
      dead-letter-topic: generation.async-batch-task.v1.dlt
      consumer-group: docgen-async-batch-worker
  rendering:
    libreoffice-command: ${LIBREOFFICE_COMMAND:soffice}
    conversion-mode: ${LIBREOFFICE_CONVERSION_MODE:cli}
    docker-container-name: ${LIBREOFFICE_DOCKER_CONTAINER:docgen-libreoffice}
    conversion-timeout-seconds: 120
  jwt:
    secret: ${JWT_SECRET:local-dev-only-change-me-please-32bytes-min}
    access-token-ttl: PT30M
  storage:
    provider: ${STORAGE_PROVIDER:minio}
    bucket: ${STORAGE_BUCKET:docgen-artifacts}
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ROOT_USER:docgen}
      secret-key: ${MINIO_ROOT_PASSWORD:docgen_local_pwd}
  demo-catalog:
    seed-enabled: ${DOCGEN_SEED_DEMO_CATALOG:false}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${docgen.environment}

resilience4j:
  circuitbreaker:
    instances:
      objectStorage:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
      pdfConversion:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 2
  retry:
    instances:
      objectStorage:
        max-attempts: 3
        wait-duration: 200ms
      pdfConversion:
        max-attempts: 2
        wait-duration: 500ms

server:
  port: ${BACKEND_PORT:8080}
