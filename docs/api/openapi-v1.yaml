components:
  securitySchemes:
    ApiCredentialId:
      type: apiKey
      in: header
      name: X-Api-Credential-Id
      description: Non-secret API credential identifier.
    ApiCredentialSecret:
      type: apiKey
      in: header
      name: X-Api-Credential-Secret
      description: API credential secret. It must not be logged, audited, returned, or displayed after submission.
    AccessAccount:
      type: apiKey
      in: header
      name: X-Access-Account
      description: User or service account whose AD Group membership is evaluated.
  parameters:
    Environment:
      name: environment
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    TemplateId:
      name: templateId
      in: path
      required: true
      schema:
        type: string
        pattern: '^TPL-[A-Za-z0-9-]+$'
      example: TPL-LOAN-NOTICE
    ReleaseVersion:
      name: releaseVersion
      in: path
      required: true
      schema:
        type: string
        pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'
      example: 1.0.0
    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: string
        pattern: '^TASK-[A-Za-z0-9]+$'
      example: TASK-7K3M9Q2R
    TaskQueryRequestId:
      name: requestId
      in: query
      required: false
      schema:
        type: string
        minLength: 1
      description: Optional caller request tracking ID for task query. Audited for tracing only and not used for task lookup or idempotency.
    DocumentId:
      name: documentId
      in: path
      required: true
      schema:
        type: string
        pattern: '^DOC-[A-Za-z0-9]+$'
      example: DOC-8F2N6P4Q
    CredentialId:
      name: credentialId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    TemplateIdQuery:
      name: templateId
      in: query
      required: false
      schema:
        type: string
        pattern: '^TPL-[A-Za-z0-9-]+$'
      example: TPL-LOAN-NOTICE
    EventTypeQuery:
      name: eventType
      in: query
      required: false
      schema:
        type: string
        minLength: 1
    CredentialIdQuery:
      name: credentialId
      in: query
      required: false
      schema:
        type: string
        minLength: 1
    EventAtFromQuery:
      name: eventAtFrom
      in: query
      required: false
      schema:
        type: string
        format: date-time
      description: Inclusive lower bound of event timestamp filter in ISO-8601 format. When both eventAtFrom and eventAtTo are provided, eventAtFrom must be less than or equal to eventAtTo.
    EventAtToQuery:
      name: eventAtTo
      in: query
      required: false
      schema:
        type: string
        format: date-time
      description: Inclusive upper bound of event timestamp filter in ISO-8601 format. When both eventAtFrom and eventAtTo are provided, eventAtFrom must be less than or equal to eventAtTo.
    AuditActorRoleQuery:
      name: actorRole
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/AuditReadActorRole'
      description: >-
        Audit read actor role for admin audit read/export endpoints.
        Allowed values: AUDIT_ADMIN, GLOBAL_ADMIN, GROUP_ADMIN.
        GROUP_ADMIN requires both groupScope and templateId.
    GroupScopeQuery:
      name: groupScope
      in: query
      required: false
      schema:
        type: string
        minLength: 1
      description: Required when actorRole is GROUP_ADMIN for management audit read, management audit export, and lifecycle audit read; GROUP_ADMIN requests must provide both groupScope and templateId.
    TraceIdHeader:
      name: X-Trace-Id
      in: header
      required: false
      schema:
        type: string
        minLength: 1
      description: Optional caller trace ID. If omitted, the platform generates traceId.
  headers:
    AuditId:
      schema:
        type: string
    TraceId:
      schema:
        type: string
    RequestId:
      schema:
        type: string
    IdempotencyKey:
      schema:
        type: string
    IdempotencyStatus:
      schema:
        $ref: '#/components/schemas/IdempotencyStatus'
    DocumentId:
      schema:
        type: string
    TemplateId:
      schema:
        type: string
    RouteType:
      schema:
        $ref: '#/components/schemas/RouteType'
    ResolvedReleaseVersion:
      schema:
        type: string
    OutputFormat:
      schema:
        $ref: '#/components/schemas/OutputFormat'
    OutputMode:
      schema:
        $ref: '#/components/schemas/OutputMode'
    FidelityWarningCount:
      schema:
        type: integer
        minimum: 0
    FidelityWarningCodes:
      schema:
        type: string
  responses:
    AsyncAccepted:
      description: Async task accepted.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AsyncAcceptedResponse'
    ErrorResponse:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    OutputFormat:
      type: string
      enum: [DOCX, PDF]
    OutputMode:
      type: string
      enum: [SYNC_STREAM, SYNC_DOWNLOAD_URL, ASYNC_TASK]
    RouteType:
      type: string
      enum: [EXPLICIT_VERSION, DEFAULT_ROUTE]
    FidelityWarningCode:
      type: string
      enum: [OPTIONAL_CONTENT_EMPTY, LOW_RISK_PAGINATION_DIFFERENCE, LOW_RISK_TABLE_PAGE_BREAK, CONTROLLED_STYLE_FALLBACK, IMAGE_SCALING_ADJUSTED]
    IdempotencyStatus:
      type: string
      enum: [IDEMPOTENCY_NEW, IDEMPOTENCY_REPLAYED, IDEMPOTENCY_CONFLICTED]
    TaskStatus:
      type: string
      enum: [ACCEPTED, PROCESSING, SUCCEEDED, FAILED, PARTIAL_SUCCEEDED, EXPIRED, CANCELLED]
    BatchItemStatus:
      type: string
      enum: [SUCCEEDED, FAILED, SKIPPED]
    Permission:
      type: string
      enum: [ALLOW_PRINT, ALLOW_COPY, ALLOW_EDIT, ALLOW_ANNOTATE, ALLOW_FORM_FILL]
    Context:
      type: object
      additionalProperties: false
      properties:
        sourceSystem:
          type: string
        channel:
          type: string
        businessRequestId:
          type: string
        upstreamTraceId:
          type: string
        scenario:
          type: string
        locale:
          type: string
    OutputOptions:
      type: object
      additionalProperties: false
      required: [format, mode]
      properties:
        format:
          $ref: '#/components/schemas/OutputFormat'
        mode:
          $ref: '#/components/schemas/OutputMode'
    EncryptionOptions:
      type: object
      description: >-
        Dynamic encryption options. When enabled is true, openPassword is
        required. When permissions are provided, ownerPassword is required.
        When enabled is false, openPassword, ownerPassword, and permissions are
        not allowed. openPassword and ownerPassword must be different when both
        are present.
      additionalProperties: false
      required: [enabled]
      allOf:
        - if:
            properties:
              enabled:
                const: true
            required: [enabled]
          then:
            required: [openPassword]
        - if:
            properties:
              enabled:
                const: false
            required: [enabled]
          then:
            not:
              anyOf:
                - required: [openPassword]
                - required: [ownerPassword]
                - required: [permissions]
        - if:
            required: [permissions]
          then:
            required: [ownerPassword]
      properties:
        enabled:
          type: boolean
        openPassword:
          type: string
          minLength: 12
          maxLength: 128
          writeOnly: true
        ownerPassword:
          type: string
          minLength: 12
          maxLength: 128
          writeOnly: true
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
          uniqueItems: true
    Variables:
      type: object
      description: Template variables constrained by the selected release version variable schema.
      additionalProperties: true
    GenerateRequest:
      type: object
      additionalProperties: false
      required: [output, variables, requestId, idempotencyKey]
      properties:
        output:
          $ref: '#/components/schemas/OutputOptions'
        variables:
          $ref: '#/components/schemas/Variables'
        encryption:
          $ref: '#/components/schemas/EncryptionOptions'
        requestId:
          type: string
        idempotencyKey:
          type: string
        context:
          $ref: '#/components/schemas/Context'
    BatchGenerateRequest:
      type: object
      additionalProperties: false
      required: [output, items, requestId, idempotencyKey]
      properties:
        output:
          $ref: '#/components/schemas/OutputOptions'
        encryption:
          $ref: '#/components/schemas/EncryptionOptions'
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/BatchGenerateItem'
        requestId:
          type: string
        idempotencyKey:
          type: string
        originalBatchId:
          type: string
          pattern: '^BATCH-[A-Za-z0-9]+$'
        context:
          $ref: '#/components/schemas/Context'
    BatchGenerateItem:
      type: object
      additionalProperties: false
      required: [itemId, variables]
      properties:
        itemId:
          type: string
        variables:
          $ref: '#/components/schemas/Variables'
        output:
          $ref: '#/components/schemas/OutputOptions'
        encryption:
          $ref: '#/components/schemas/EncryptionOptions'
    Metadata:
      type: object
      additionalProperties: false
      required: [auditId, traceId]
      properties:
        auditId:
          type: string
        traceId:
          type: string
        requestId:
          type: string
        idempotencyKey:
          type: string
          description: Echoed for generation success and generation error responses.
        idempotencyStatus:
          $ref: '#/components/schemas/IdempotencyStatus'
        originalRequestAt:
          type: string
          format: date-time
          description: Always returned for successful idempotent replay responses and for idempotency conflict safe summaries.
        templateId:
          type: string
        routeType:
          $ref: '#/components/schemas/RouteType'
        resolvedReleaseVersion:
          type: string
        output:
          $ref: '#/components/schemas/OutputOptions'
    DownloadUrlResponse:
      type: object
      additionalProperties: false
