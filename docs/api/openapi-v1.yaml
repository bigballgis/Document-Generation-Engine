openapi: 3.1.0
info:
  title: Document Generation Dynamic API
  version: 1.0.0
  summary: Enterprise financial letter document generation API contract
  description: >-
    Formal v1 OpenAPI contract for template-based document generation. Template
    variables are constrained by each released template version contract.
servers:
  - url: /
    description: Deployment root. Paths include /api/{environment}/v1.
tags:
  - name: Contract
    description: Contract discovery and callable version visibility.
  - name: Generation
    description: Single and batch document generation.
  - name: Task
    description: Async task query and cancellation.
  - name: Download
    description: Generated document download.
  - name: Admin
    description: API management, credential lifecycle administration, template lifecycle governance, and content-module governance.
security:
  - ApiCredentialId: []
    ApiCredentialSecret: []
    AccessAccount: []
paths:
  /api/{environment}/v1/templates/{templateId}/contract:
    get:
      tags: [Contract]
      operationId: getTemplateApiContract
      summary: Get template API contract summary
      description: Returns the current authorized contract summary, policy summary, callable versions, error code summary, and example index. The response does not embed this full OpenAPI YAML file.
      parameters:
        - $ref: '#/components/parameters/Environment'
        - $ref: '#/components/parameters/TemplateId'
        - $ref: '#/components/parameters/TraceIdHeader'
      responses:
        '200':
          description: Contract summary returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
        '410':
          $ref: '#/components/responses/ErrorResponse'
        '422':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'
        '504':
          $ref: '#/components/responses/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/{environment}/v1/templates/{templateId}/versions:
    get:
      tags: [Contract]
      operationId: listCallableVersions
      summary: List callable release versions
      description: Returns release versions currently callable from the caller's authorization view. This is not a back-office version management list.
      parameters:
        - $ref: '#/components/parameters/Environment'
        - $ref: '#/components/parameters/TemplateId'
        - $ref: '#/components/parameters/TraceIdHeader'
      responses:
        '200':
          description: Callable release versions returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallableVersionsResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
        '410':
          $ref: '#/components/responses/ErrorResponse'
        '422':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'
        '504':
          $ref: '#/components/responses/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/{environment}/v1/templates/{templateId}/versions/{releaseVersion}/generate:
    post:
      tags: [Generation]
      operationId: generateDocumentByVersion
      summary: Generate a document by explicit release version
      parameters:
        - $ref: '#/components/parameters/Environment'
        - $ref: '#/components/parameters/TemplateId'
        - $ref: '#/components/parameters/ReleaseVersion'
        - $ref: '#/components/parameters/TraceIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequest'
      responses:
        '200':
          description: Synchronous generation completed.
          headers:
            auditId:
              $ref: '#/components/headers/AuditId'
            traceId:
              $ref: '#/components/headers/TraceId'
            requestId:
              $ref: '#/components/headers/RequestId'
            idempotencyKey:
              $ref: '#/components/headers/IdempotencyKey'
            idempotencyStatus:
              $ref: '#/components/headers/IdempotencyStatus'
            documentId:
              $ref: '#/components/headers/DocumentId'
            templateId:
              $ref: '#/components/headers/TemplateId'
            routeType:
              $ref: '#/components/headers/RouteType'
            resolvedReleaseVersion:
              $ref: '#/components/headers/ResolvedReleaseVersion'
            output.format:
              $ref: '#/components/headers/OutputFormat'
            output.mode:
              $ref: '#/components/headers/OutputMode'
            fidelityWarningCount:
              $ref: '#/components/headers/FidelityWarningCount'
            fidelityWarningCodes:
              $ref: '#/components/headers/FidelityWarningCodes'
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadUrlResponse'
        '202':
          $ref: '#/components/responses/AsyncAccepted'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
        '410':
          $ref: '#/components/responses/ErrorResponse'
        '422':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'
        '504':
          $ref: '#/components/responses/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
