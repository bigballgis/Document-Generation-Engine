            idempotencyKey:
              $ref: '#/components/headers/IdempotencyKey'
            idempotencyStatus:
              $ref: '#/components/headers/IdempotencyStatus'
            documentId:
              $ref: '#/components/headers/DocumentId'
            templateId:
              $ref: '#/components/headers/TemplateId'
            routeType:
              $ref: '#/components/headers/RouteType'
            resolvedReleaseVersion:
              $ref: '#/components/headers/ResolvedReleaseVersion'
            output.format:
              $ref: '#/components/headers/OutputFormat'
            output.mode:
              $ref: '#/components/headers/OutputMode'
            fidelityWarningCount:
              $ref: '#/components/headers/FidelityWarningCount'
            fidelityWarningCodes:
              $ref: '#/components/headers/FidelityWarningCodes'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadUrlResponse'
            application/octet-stream:
              schema:
                type: string
                format: binary
        '202':
          $ref: '#/components/responses/AsyncAccepted'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
        '410':
          $ref: '#/components/responses/ErrorResponse'
        '422':
